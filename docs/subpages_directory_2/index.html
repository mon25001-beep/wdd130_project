<!DOCTYPE html>
<html>
<head>
    <title>Campus Lost & Found - Map</title>

    <!-- Two Google Fonts for the webpage -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Open+Sans&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Header -->
    <div>
        <!-- Logo -->
        <img src="images/logo.png" alt="Campus Lost & Found Logo" width="150">

        <h1>Campus Lost & Found</h1>

        <a href="#">Home</a> |
        <a href="#">Map</a> |
        <a href="#">Recent Items</a>
    </div>

    <hr>

    <!-- Title Page -->
    <h2>Campus Map</h2>

    <!-- The Search Bar -->
    <div>
        <input type="text" placeholder="Search for a building...">
        <button>Search</button>
    </div>

    <br>

    <!-- This part is  the main content -->
    <table border="1" width="100%">
        <tr>
            <!-- Map Section to the Left -->
            <td width="70%">
                <img src="images/Campus bldgs.png.png" alt="Campus bldgs" width="100%">
            </td>

            <!-- Building List to theRight -->
            <td width="30%">
                <h3>Building List</h3>
                <ul>
                    <li>Taylor Building</li>
                    <li>Smith Building</li>
                    <li>Manwaring Center</li>
                    <li>Library</li>
                    <li>Hart Building</li>
                </ul>
            </td>
        </tr>
    </table>

    <br>

    <!-- Instructions -->
    <p>Select a building to view lost and found items.</p>

    <hr>

    <!-- Footer -->
    <div>
        <a href="#">Instructions</a> |
        <a href="#">Privacy Policy</a> |
        <a href="#">Terms of Service</a>
    </div>

</body>
</html>
